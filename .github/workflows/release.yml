name: Release

# Push a tag like v0.2.0 and this builds, signs, and publishes a macOS release
# (DMG + signed updater artifact + latest.json) that the in-app updater serves.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest # Apple Silicon (arm64) → darwin-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build, sign & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PILOT ${{ github.ref_name }}"
          releaseBody: "Automatic update. Open PILOT and click Update now."
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      # Attach a STABLE-named copy of the DMG so the README download button
      # (releases/latest/download/PILOT-AppleSilicon.dmg) never 404s when the
      # version-named file changes each release.
      - name: Attach stable-named DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target -name '*_aarch64.dmg' | head -1)
          echo "found dmg: $DMG"
          cp "$DMG" PILOT-AppleSilicon.dmg
          gh release upload "${{ github.ref_name }}" PILOT-AppleSilicon.dmg --repo "${{ github.repository }}" --clobber
