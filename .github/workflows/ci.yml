name: CI

# Runs on every push and PR (the release workflow only runs on v* tags). This is
# the gate that stops regressions reaching Peter: the v0.4.0 retrieval bug that
# made PILOT claim it had no data was a pure-function bug a unit test catches in
# seconds. typecheck + tests + build must all pass before anything is released.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
